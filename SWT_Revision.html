<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWT Revision</title>
<style>
  html,body{height:100%;margin:0}
  body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;display:flex;align-items:center;justify-content:center}
  .box{width:min(420px,86vw);text-align:center}
  h1{font-size:1.15rem;font-weight:600;margin:0 0 .25rem}
  p{color:#94a3b8;font-size:.85rem;margin:.15rem 0 1.25rem}
  .bar{height:8px;background:#1e293b;border-radius:99px;overflow:hidden}
  .fill{height:100%;width:0;background:linear-gradient(90deg,#38bdf8,#0ea5e9);transition:width .2s ease}
  .pct{margin-top:.6rem;font-size:.8rem;color:#94a3b8}
  .err{color:#f87171;font-size:.85rem;margin-top:1rem;display:none}
  a{color:#38bdf8}
</style>
</head>
<body>
<div class="box">
  <h1>SWT Revision</h1>
  <p>Loading&hellip; please wait</p>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="pct" id="pct">0%</div>
  <div class="err" id="err"></div>
  <p style="margin-top:1rem"><a href="index.html">&larr; Back to Question Bank</a></p>
</div>
<script>
(function(){
  var parts = ["SWT_Revision.part1.js", "SWT_Revision.part2.js", "SWT_Revision.part3.js"];
  var fill = document.getElementById('fill');
  var pct  = document.getElementById('pct');
  var err  = document.getElementById('err');
  var i = 0;
  function progress(){ var p = Math.round((i/parts.length)*100); fill.style.width=p+'%'; pct.textContent=p+'%'; }
  function assemble(){
    try{
      var html = (window.__QBPARTS||[]).join('');
      window.__QBPARTS = null;
      document.open(); document.write(html); document.close();
    }catch(e){ fail(e.message||'Could not render content.'); }
  }
  function fail(msg){ err.style.display='block'; err.textContent = msg; }
  function next(){
    if(i>=parts.length){ progress(); assemble(); return; }
    var s = document.createElement('script');
    s.src = parts[i];
    s.onload = function(){ i++; progress(); next(); };
    s.onerror = function(){ fail('Failed to load ' + parts[i] + '. Make sure the .part files are in the same folder.'); };
    document.head.appendChild(s);
  }
  next();
})();
</script>
</body>
</html>
